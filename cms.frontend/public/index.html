    <style>
        body {
            color: #1b1c1c;
        }
        .petal-shadow {
            box-shadow: 0 4px 20px rgba(171, 44, 93, 0.08);
        }
        .active-tab {
            border-bottom: 2px solid #ab2c5d;
            padding-bottom: 4px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input[type="checkbox"]:checked, input[type="radio"]:checked {
            background-color: #ab2c5d;
            border-color: #ab2c5d;
        }
        input[type="checkbox"]:focus, input[type="radio"]:focus {
            --tw-ring-color: #f06292;
        }

        a { color: inherit; }
        a:hover { color: #ab2c5d; }

        .btn-luxury {
            position: relative;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .btn-luxury:active { transform: scale(0.96) !important; }

        .btn-primary-luxury {
            overflow: hidden;
            z-index: 1;
        }
        .btn-primary-luxury::before {
            content: '';
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }
        .btn-primary-luxury:hover::before { opacity: 1; }
        .btn-primary-luxury:hover {
            box-shadow: 0 4px 24px rgba(171,44,93,0.2);
        }

        .btn-ghost-luxury {
            background: transparent; border: none;
            transition: opacity 0.25s ease, transform 0.15s ease;
            cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-ghost-luxury:hover { opacity: 0.7; }
        .btn-ghost-luxury:active { transform: scale(0.88) !important; }

        .btn-link-luxury {
            display: inline-block;
            position: relative;
            cursor: pointer;
        }
        .btn-link-luxury::after {
            content: '';
            position: absolute; bottom: -1px; left: 50%;
            width: 0; height: 1px;
            background: currentColor;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(-50%);
        }
        .btn-link-luxury:hover::after { width: 100%; }
        .btn-link-luxury:hover { opacity: 0.65; }

        .ambient-bg {
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -20%, rgba(171,44,93,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(244,220,228,0.5) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 20% 80%, rgba(255,217,225,0.3) 0%, transparent 50%);
            background-color: #fbf9f8;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-12px); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        html { scroll-behavior: smooth; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* CKEditor HTML Rendering Styles */
        .blog-detail-content {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 16px;
            line-height: 1.8;
            color: #3f001b;
        }
        
        .blog-detail-content strong {
            font-weight: 700;
            color: #1b1c1c;
        }
        
        .blog-detail-content em {
            font-style: italic;
        }

        .blog-detail-content p {
            margin-bottom: 1.5rem;
            text-align: justify;
        }
        
        .blog-detail-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #ab2c5d;
        }

        .blog-detail-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
            margin-top: 1.75rem;
            margin-bottom: 0.75rem;
            color: #ab2c5d;
        }

        .blog-detail-content ul {
            list-style-type: disc;
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .blog-detail-content ol {
            list-style-type: decimal;
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .blog-detail-content li {
            margin-bottom: 0.5rem;
        }

        .blog-detail-content blockquote {
            border-left: 4px solid #ab2c5d;
            padding-left: 1rem;
            margin-left: 0;
            margin-right: 0;
            margin-bottom: 1.5rem;
            font-style: italic;
            color: #6b5a60;
        }

        .blog-detail-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(171, 44, 93, 0.08);
        }

        .blog-detail-content figure.image {
            margin: 30px auto;
            text-align: center;
        }

        .blog-detail-content figure.image figcaption {
            font-size: 14px;
            font-style: italic;
            color: #8a7176;
            margin-top: 8px;
        }
    </style>
